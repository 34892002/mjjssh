name: Windows build

on:
  pull_request:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    name: Verify Windows build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: my-ssh-frontend
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: my-ssh-frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: my-ssh-frontend/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  release:
    name: Build Windows installers
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: my-ssh-frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: my-ssh-frontend/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: my-ssh-frontend
        run: npm ci

      - name: Build and publish installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: my-ssh-frontend
          tagName: ${{ github.ref_name }}
          releaseName: MJJSSH ${{ github.ref_name }}
          releaseBody: Windows installer release for ${{ github.ref_name }}.
          releaseDraft: true
          prerelease: false
